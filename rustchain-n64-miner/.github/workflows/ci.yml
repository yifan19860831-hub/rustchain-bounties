name: CI

on:
  push:
    branches: [ main, bounty-429-n64 ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  # Build and test on host (x86_64)
  build-host:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-action@stable
      with:
        components: clippy, rustfmt
    
    - name: Check formatting
      run: cargo fmt --all -- --check
    
    - name: Run Clippy
      run: cargo clippy --features std -- -D warnings
    
    - name: Build (host)
      run: cargo build --features std
    
    - name: Run tests
      run: cargo test --features std

  # Build for N64 bare-metal target
  build-n64:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-action@stable
    
    - name: Add MIPS64 target
      run: rustup target add mips64-unknown-none
    
    - name: Build N64 ROM
      run: cargo build --release --target mips64-unknown-none --features n64-homebrew
    
    - name: Verify binary
      run: |
        ls -lh target/mips64-unknown-none/release/rustchain-n64
        file target/mips64-unknown-none/release/rustchain-n64

  # Build for N64 Linux target
  build-n64-linux:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-action@stable
    
    - name: Add MIPS64 Linux target
      run: rustup target add mips64-unknown-linux-gnu
    
    - name: Build N64 Linux binary
      run: cargo build --release --target mips64-unknown-linux-gnu --features network
    
    - name: Verify binary
      run: |
        ls -lh target/mips64-unknown-linux-gnu/release/rustchain-n64
        file target/mips64-unknown-linux-gnu/release/rustchain-n64

  # Documentation
  docs:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-action@stable
    
    - name: Build documentation
      run: cargo doc --features n64-homebrew --no-deps
    
    - name: Upload documentation
      uses: actions/upload-artifact@v4
      with:
        name: documentation
        path: target/doc/

  # Security audit
  audit:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-action@stable
    
    - name: Install cargo-audit
      run: cargo install cargo-audit
    
    - name: Run security audit
      run: cargo audit

  # Size analysis
  size:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-action@stable
    
    - name: Add MIPS64 target
      run: rustup target add mips64-unknown-none
    
    - name: Install cargo-bloat
      run: cargo install cargo-bloat
    
    - name: Build with size optimization
      run: cargo build --release --target mips64-unknown-none --features n64-homebrew
    
    - name: Analyze binary size
      run: cargo bloat --release --target mips64-unknown-none --features n64-homebrew

  # Create ROM artifact
  artifact:
    runs-on: ubuntu-latest
    needs: [build-n64]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-action@stable
    
    - name: Add MIPS64 target
      run: rustup target add mips64-unknown-none
    
    - name: Build N64 ROM
      run: cargo build --release --target mips64-unknown-none --features n64-homebrew
    
    - name: Create ROM file
      run: |
        cp target/mips64-unknown-none/release/rustchain-n64 rustchain-n64.z64
    
    - name: Upload ROM artifact
      uses: actions/upload-artifact@v4
      with:
        name: rustchain-n64-rom
        path: rustchain-n64.z64
        retention-days: 30
