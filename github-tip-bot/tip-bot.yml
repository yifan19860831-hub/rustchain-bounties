name: RTC Tip Bot

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  tip:
    runs-on: ubuntu-latest
    steps:
      - name: Parse /tip command
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.comment.body;
            
            // Check for /tip command
            const tipMatch = body.match(/^\/tip\s+@(\w+)\s+(\d+(?:\.\d+)?)\s*RTC\s*(.*)?$/i);
            
            if (tipMatch) {
              const recipient = tipMatch[1];
              const amount = parseFloat(tipMatch[2]);
              const memo = tipMatch[3] || '';
              
              // Store tip info for next steps
              core.setOutput('recipient', recipient);
              core.setOutput('amount', amount);
              core.setOutput('memo', memo);
              core.setOutput('should_tip', 'true');
            } else {
              // Check for other commands
              if (body.startsWithWith('/')) {
                console.log('Other command detected:', body);
              }
              core.setOutput('should_tip', 'false');
            }
        id: parse

      - name: Check balance (if /balance command)
        if: startsWith(github.event.comment.body, '/balance')
        uses: actions/github-script@v7
        with:
          script: |
            // Extract wallet from command or use commenter's username
            const body = context.payload.comment.body;
            const wallet = body.replace('/balance', '').trim() || context.payload.comment.user.login;
            
            // Call RustChain API to check balance
            const https = require('https');
            const req = https.request({
              hostname: '50.28.86.131',
              port: 443,
              path: `/wallet/balance?miner_id=${wallet}`,
              method: 'GET'
            }, (res) => {
              let data = '';
              res.on('data', (chunk) => data += chunk);
              res.on('end', () => {
                const balance = JSON.parse(data);
                const response = `💰 RTC Balance for ${wallet}: ${balance.amount_rtc || 0} RTC`;
                
                // Post comment
                github.rest.issues.createComment({
                  issue_number: context.payload.issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body: response
                });
              });
            });
            req.end();

      - name: Register wallet (if /register command)
        if: startsWith(github.event.comment.body, '/register')
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.comment.body;
            const wallet = body.replace('/register', '').trim();
            
            if (!wallet) {
              github.rest.issues.createComment({
                issue_number: context.payload.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: 'Usage: /register WALLET_NAME'
              });
              return;
            }
            
            // Register wallet (would need API endpoint)
            github.rest.issues.createComment({
              issue_number: context.payload.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ Wallet registered: ${wallet}\n\nNote: This feature requires admin API key.`
            });

      - name: Process tip
        if: steps.parse.outputs.should_tip == 'true'
        env:
          RUSTCHAIN_ADMIN_KEY: ${{ secrets.RUSTCHAIN_ADMIN_KEY }}
        run: |
          echo "Processing tip..."
          echo "Recipient: ${{ steps.parse.outputs.recipient }}"
          echo "Amount: ${{ steps.parse.outputs.amount }}"
          echo "Memo: ${{ steps.parse.outputs.memo }}"
          
          # Note: Actual transfer requires admin key
          # This is a placeholder for the actual implementation
          
          # Post confirmation comment
          echo "✅ Tip queued: ${{ steps.parse.outputs.amount }} RTC → ${{ steps.parse.outputs.recipient }}"
