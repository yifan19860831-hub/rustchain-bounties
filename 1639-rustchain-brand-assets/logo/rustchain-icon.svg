<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- RustChain Icon Logo -->
  <!-- 图标版本 - 用于头像、favicon -->
  
  <!-- Background Hexagon -->
  <path d="M256 20 L446 130 L446 350 L256 460 L66 350 L66 130 Z" 
        fill="url(#rustGradient)" 
        stroke="#8B3103" 
        stroke-width="4"/>
  
  <!-- Gear Icon (centered) -->
  <g transform="translate(256, 256)">
    <!-- Outer Gear Circle -->
    <circle cx="0" cy="0" r="120" fill="none" stroke="#C0C0C0" stroke-width="10"/>
    
    <!-- Gear Teeth -->
    <g stroke="#C0C0C0" stroke-width="16" stroke-linecap="round">
      <!-- 12 gear teeth -->
      <line x1="0" y1="-130" x2="0" y2="-150"/>
      <line x1="0" y1="130" x2="0" y2="150"/>
      <line x1="-130" y1="0" x2="-150" y2="0"/>
      <line x1="130" y1="0" x2="150" y2="0"/>
      <line x1="-92" y1="-92" x2="-106" y2="-106"/>
      <line x1="92" y1="92" x2="106" y2="106"/>
      <line x1="-92" y1="92" x2="-106" y2="106"/>
      <line x1="92" y1="-92" x2="106" y2="-106"/>
      <line x1="-65" y1="-113" x2="-75" y2="-130"/>
      <line x1="65" y1="113" x2="75" y2="130"/>
      <line x1="-65" y1="113" x2="-75" y2="130"/>
      <line x1="65" y1="-113" x2="75" y2="-130"/>
    </g>
    
    <!-- Inner Circle -->
    <circle cx="0" cy="0" r="70" fill="#D4AF37"/>
    
    <!-- Chain Links (representing blockchain) -->
    <g stroke="#1A1A2E" stroke-width="6" fill="none">
      <rect x="-40" y="-20" width="30" height="40" rx="8"/>
      <rect x="10" y="-20" width="30" height="40" rx="8"/>
    </g>
  </g>
  
  <!-- Gradients -->
  <defs>
    <linearGradient id="rustGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#B7410E;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8B3103;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5C2002;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>
