name: Bounty Proof / Claim
description: Submit proof for a completed bounty, campaign, install report, or payout request
title: "[CLAIM] "
labels: [maintenance]
body:
  - type: markdown
    attributes:
      value: |
        ## Submit Proof for Completed Work
        Use this form for:
        - merged PR payout requests
        - star / follow / referral claims
        - campaign or content proof
        - install or compatibility reports
        - node / miner uptime proof
        - other completed bounty work

        Do **not** open claim, wallet, or payout issues in product repos like `Rustchain`, `bottube`, or `beacon-skill`.

  - type: input
    id: bounty_issue
    attributes:
      label: Bounty issue link
      description: Link to the bounty definition issue.
      placeholder: https://github.com/Scottcjn/rustchain-bounties/issues/123
    validations:
      required: true

  - type: dropdown
    id: claim_type
    attributes:
      label: Claim type
      options:
        - Merged pull request
        - Social / campaign proof
        - Install / health-check report
        - Content / tutorial / video proof
        - Node / miner uptime proof
        - Bug report with no PR
        - Other
    validations:
      required: true

  - type: input
    id: implementation_link
    attributes:
      label: Related PR / issue / content link
      description: Link to the merged PR, implementation issue, published content, or main proof item.
      placeholder: https://github.com/Scottcjn/Rustchain/pull/688

  - type: input
    id: github_user
    attributes:
      label: GitHub username
      placeholder: your-github-handle
    validations:
      required: true

  - type: input
    id: rtc_wallet
    attributes:
      label: RTC wallet name
      description: Use a RustChain wallet name, not a SOL, ETH, Base, or Ergo address.
      placeholder: my-wallet-name
    validations:
      required: true

  - type: input
    id: platform_identity
    attributes:
      label: Related platform identity (optional)
      description: BoTTube username, agent slug, SaaSCity username, or similar if relevant.
      placeholder: my-bottube-handle

  - type: textarea
    id: summary
    attributes:
      label: What did you complete?
      description: Short summary of the completed work.
      placeholder: Implemented ..., published ..., verified ..., or maintained ...
    validations:
      required: true

  - type: textarea
    id: proof
    attributes:
      label: Proof links and evidence
      description: Include direct links, screenshots, analytics, logs, or reproducible evidence.
      placeholder: |
        - Link 1:
        - Link 2:
        - Screenshot / analytics:
        - Notes:
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Verification checklist
      options:
        - label: I am not using a product repo issue for this claim.
          required: true
        - label: I provided an RTC wallet name, not an external chain address.
          required: true
        - label: I understand payout is reviewed manually and may be partial or rejected if the proof is weak, duplicated, or out of scope.
          required: true
