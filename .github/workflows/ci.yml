name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-action@stable
      with:
        components: clippy, rustfmt
    
    - name: Cache cargo registry
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Check formatting
      run: cargo fmt --all -- --check
    
    - name: Run Clippy
      run: cargo clippy -- -D warnings
    
    - name: Build
      run: cargo build --release
    
    - name: Run tests
      run: cargo test --release

  build-cross:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - x86_64-apple-darwin
          - x86_64-pc-windows-msvc
          - aarch64-unknown-linux-gnu
          - aarch64-apple-darwin
          - powerpc64-unknown-linux-gnu
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-action@stable
    
    - name: Add target
      run: rustup target add ${{ matrix.target }}
    
    - name: Install cross-compilation tools
      if: contains(matrix.target, 'aarch64-unknown-linux-gnu')
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-aarch64-linux-gnu
    
    - name: Install cross-compilation tools (PowerPC)
      if: contains(matrix.target, 'powerpc64')
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-powerpc64-linux-gnu
    
    - name: Build for target
      run: cargo build --release --target ${{ matrix.target }}
    
    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: rustchain-miner-${{ matrix.target }}
        path: target/${{ matrix.target }}/release/rustchain-miner*

  release:
    needs: [build, build-cross]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download all artifacts
      uses: actions/download-artifact@v3
    
    - name: Create release archives
      run: |
        for dir in rustchain-miner-*; do
          cd "$dir"
          tar -czvf "../${dir}.tar.gz" *
          cd ..
        done
    
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: rustchain-miner-*.tar.gz
